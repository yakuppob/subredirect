events {
    worker_connections 1024;
}

http {
    # Dinamik domain çözümü için Google DNS
    resolver 8.8.8.8 valid=30s;

    # 1. GÜNCEL İZİN VERİLEN DOMAIN LİSTESİ
    map $arg_url $is_allowed {
        default 0;
        "~*207\.180\.239\.205:8627" 1;
        "~*sub\.togreben\.xyz" 1;
        "~*lite\.togreben\.xyz" 1;
        "~*panel\.fkjwox\.xyz:8000" 1;
    }

    server {
        # Cloud Run portu
        listen 8080;

        # /sub isteklerini yakala
        location /sub {
            # Güvenlik Kontrolü
            if ($is_allowed = 0) {
                return 403 "Erişim Reddedildi: Yetkisiz Sunucu Patron!";
            }

            # Dinamik olarak hedef URL'e yönlendir
            proxy_pass $arg_url;

            # Bağlantı başlıkları
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # --- HAPP / HİDDİFY UYGULAMA AYARLARI ---
            add_header profile-title "Name VPN" always;
            add_header profile-update-interval "24" always;
            add_header profile-web-page-url "https://google.com" always;

            # Zaman aşımı süreleri
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Ana dizin kontrolü
        location / {
            return 200 "Sistem Yeni Listeyle Aktif Patron!";
        }
    }
}
