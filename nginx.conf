events {
    worker_connections 1024;
}

http {
    server {
        # Cloud Run'ın dinlediği port
        listen 8080;

        # /sub/ ile başlayan her şeyi Marzban'a gönder
        location /sub/ {
            proxy_pass http://207.180.239.205:8627/sub/;
            
            # Bağlantının düzgün kurulması için gereken başlıklar
            proxy_set_header Host 207.180.239.205:8627;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # --- HAPP / HİDDİFY AYARLARI ---
            # Marzban'dan gelen orijinal verilere (GB kullanımı vs.) dokunmaz, 
            # üstüne VPN uygulamasında görünecek ismi ve yenilenme süresini ekler.
            add_header profile-title "Name VPN" always;
            add_header profile-update-interval "24" always;
            add_header profile-web-page-url "https://google.com" always;
            
            # Zaman aşımı sorunlarını engellemek için
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Ana dizine (/) gidilirse sistemin çalıştığını göstersin
        location / {
            return 200 "Sistem Aktif Patron!";
        }
    }
}
